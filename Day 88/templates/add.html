<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a New Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">☕ Laptop Friendly Cafes</a>
            <a href="{{ url_for('home') }}" class="btn btn-outline-light btn-sm">Back to Home</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h2 class="mb-4 text-center">Add a New Laptop-Friendly Cafe</h2>
        
        <div class="card p-4 shadow-sm mb-5">
            <form action="{{ url_for('add_cafe') }}" method="POST">
                
                <div class="mb-3">
                    <label for="name" class="form-label">Cafe Name</label>
                    <input type="text" class="form-content form-control" id="name" name="name" required placeholder="e.g., Costa Coffee">
                </div>

                <div class="mb-3">
                    <label for="map_url" class="form-label">Google Maps URL</label>
                    <input type="url" class="form-control" id="map_url" name="map_url" required placeholder="https://goo.gl/maps/...">
                </div>

                <div class="mb-3">
                    <label for="img_url" class="form-label">Image URL</label>
                    <input type="url" class="form-control" id="img_url" name="img_url" required placeholder="https://images.unsplash.com/...">
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Location / Area</label>
                    <input type="text" class="form-control" id="location" name="location" required placeholder="e.g., Shoreditch, London">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="seats" class="form-label">Number of Seats</label>
                        <input type="text" class="form-control" id="seats" name="seats" required placeholder="e.g., 20-30">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="coffee_price" class="form-label">Average Coffee Price</label>
                        <input type="text" class="form-control" id="coffee_price" name="coffee_price" required placeholder="e.g., £2.80">
                    </div>
                </div>

                <hr class="my-4">
                <h5 class="mb-3">Amenities Available</h5>
                
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="has_wifi" name="has_wifi">
                    <label class="form-check-input-label form-label" for="has_wifi">📶 Reliable Wi-Fi</label>
                </div>

                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="has_sockets" name="has_sockets">
                    <label class="form-check-input-label form-label" for="has_sockets">🔌 Power Sockets Available</label>
                </div>

                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="has_toilet" name="has_toilet">
                    <label class="form-check-input-label form-label" for="has_toilet">🚽 Customer Toilets</label>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" id="can_take_calls" name="can_take_calls">
                    <label class="form-check-input-label form-label" for="can_take_calls">📞 Allowed to take Calls/Meetings</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">Add Cafe to Database</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
